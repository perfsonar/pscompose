<div id="form" class="w-full">
    <div hx-get="/partials/confirm-modals.html" hx-trigger="load"></div>
</div>
<script>
    (function () {
        const subsection = psCompose.subsection;
        const hasId = new URLSearchParams(window.location.search).has("id");
        const urlMap = {
            new: "/partials/data_new_form.html",
            read: "/partials/data_read_form.html",
        };
        const url =
            urlMap[subsection] ??
            (hasId ? "/partials/data_edit_form.html" : "/partials/data_blank_form.html");

        const elem = document.createElement("div");
        elem.setAttribute("hx-get", url);
        elem.setAttribute("hx-trigger", "load");
        const container = document.getElementById("form");
        container.appendChild(elem);
        htmx.process(container);
    })();
</script>
